version: "3.9"

services:

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"     # RTSP
      - "1935:1935"     # RTMP
      - "9090:9090"     # API
    environment:
      MTX_LOGLEVEL: info

  birdnetgo:
    image: ghcr.io/tphakala/birdnet-go:latest
    container_name: birdnetgo
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./birdnet/birdnet-config.json:/config.json:ro
    environment:
      - RTSP_USER=${RTSP_USER}
      - RTSP_PASS=${RTSP_PASS}
    ports:
      - "9839:8080"     # BirdNET-Go UI

  birdcall:
    build: ./birdcall
    container_name: birdcall
    restart: unless-stopped
    depends_on:
      - mediamtx
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - STREAM_URL=rtmp://mediamtx:1935/birdcall
      - MEDIAMTX_URL=http://mediamtx:9090
