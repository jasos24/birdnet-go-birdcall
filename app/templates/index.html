<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BirdNET Mic PWA</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b1f2a" />
    <style>
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1b3a4b, #08151c);
        color: #e6f2f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        width: 100%;
        background: rgba(7, 18, 24, 0.9);
        border: 1px solid rgba(230, 242, 245, 0.2);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 8px 0 18px;
        line-height: 1.4;
      }
      button {
        background: #4dd0e1;
        color: #032028;
        border: none;
        padding: 14px 22px;
        font-size: 16px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 700;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-top: 16px;
        padding: 12px;
        background: rgba(230, 242, 245, 0.1);
        border-radius: 12px;
        font-size: 14px;
      }
      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(77, 208, 225, 0.2);
        color: #7be8f2;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>BirdNET iPhone Mic</h1>
      <p>Tap start to stream your microphone to BirdNET Go over your LAN. Keep this page open.</p>
      <button id="startBtn">Start Mic</button>
      <div class="status" id="status">
        Status: <span class="badge" id="statusBadge">idle</span>
      </div>
    </div>

    <script src="/static/main.js"></script>
  </body>
</html>
